---
# this pipeline converts JSON schema file to thin wrapper in OpenAPI 3.0 format
# yaml-language-server: $schema=https://raw.githubusercontent.com/rkosegi/yaml-pipeline/refs/heads/main/schemas/pipeline.json
vars:
  # input file to convert
  inputFile: CHANGEME
  # where to write the output file
  outputDir: .private
  # version of output spec
  version: 1.0.0
  # OpenAPI version
  openapiVersion: 3.0.0
steps:
  010-load-input-file:
    order: 10
    import:
      file: '{{ .vars.inputFile }}'
      mode: json
      path: work.input
  015-extract-basename:
    order: 15
    template:
      template: |
        {{- printf "%s/%s" .vars.outputDir (.vars.inputFile | osBase) | replace ".json" "-spec.yaml" }}
      trim: true
      path: work.outputFile
  020-render:
    order: 20
    template:
      template: |
        {{- $out := dict }}
        {{- $_ := "" }}
        {{- $_ = set $out "openapi" .vars.openapiVersion }}
        {{- $_ = set $out "paths" dict }}
        {{- $_ = set $out "info" (dict "title" .work.input.description "version" .vars.version ) }}
        {{- $_ = set $out "components" (dict "schemas" (get .work.input "$defs")) }}
        {{- $out | toYaml | replace "#/$defs/" "#/components/schemas/" }}
      path: work.output
      parseAs: yaml
      trim: true

  040-output:
    order: 40
    export:
      path: work.output
      format: yaml
      file: '{{ .work.outputFile }}'

  099-debug:
    order: 99
    export:
      format: yaml
      file: '{{ .vars.outputDir }}/debug.yaml'
    when: '{{ eq (env "DEBUG") "true"}}'
